<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mason Cao portfolio social card</title>
  <desc id="desc">Portfolio card for Mason Cao — environmental-intelligence systems, multi-agent AI, and full-stack tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1018"/>
      <stop offset="0.55" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#090c13"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#69e0c0" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#69e0c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#eafff8"/>
      <stop offset="0.5" stop-color="#69e0c0"/>
      <stop offset="1" stop-color="#69e0c0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#eef1f6" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="920" cy="180" r="380" fill="url(#glow)"/>

  <!-- atmosphere: scattered mint particles (upper right) -->
  <g fill="#69e0c0">
    <circle cx="760" cy="120" r="2.5" opacity="0.5"/>
    <circle cx="836" cy="92" r="2" opacity="0.35"/>
    <circle cx="900" cy="150" r="3" opacity="0.6"/>
    <circle cx="980" cy="110" r="2" opacity="0.4"/>
    <circle cx="1044" cy="168" r="2.5" opacity="0.45"/>
    <circle cx="1108" cy="120" r="2" opacity="0.3"/>
    <circle cx="712" cy="186" r="2" opacity="0.3"/>
    <circle cx="1000" cy="214" r="2.5" opacity="0.4"/>
  </g>

  <!-- exoplanet transit light-curve motif (mint, glowing) -->
  <g>
    <path d="M620 250 L792 250 C828 250 842 318 880 318 C918 318 932 250 968 250 L1128 250"
          fill="none" stroke="#69e0c0" stroke-width="6" stroke-linecap="round" stroke-opacity="0.35" filter="url(#soft)"/>
    <path d="M620 250 L792 250 C828 250 842 318 880 318 C918 318 932 250 968 250 L1128 250"
          fill="none" stroke="#69e0c0" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
    <circle cx="1100" cy="190" r="34" fill="url(#star)"/>
    <circle cx="1100" cy="190" r="15" fill="#eafff8"/>
    <circle cx="880" cy="318" r="6" fill="#69e0c0"/>
  </g>

  <!-- eyebrow chip -->
  <g transform="translate(88 84)">
    <rect x="0" y="0" width="318" height="42" rx="21" fill="#69e0c0" fill-opacity="0.10" stroke="#69e0c0" stroke-opacity="0.45"/>
    <circle cx="26" cy="21" r="5" fill="#69e0c0"/>
    <text x="44" y="27" font-family="JetBrains Mono, Menlo, monospace" font-size="15" font-weight="800" letter-spacing="2" fill="#9fe9d6">ENVIRONMENTAL INTELLIGENCE</text>
  </g>

  <text x="86" y="262" font-family="Space Grotesk, Chivo, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-2" fill="#eef1f6">Mason Cao</text>
  <rect x="90" y="284" width="118" height="6" rx="3" fill="#69e0c0"/>

  <text x="88" y="356" font-family="Chivo, Arial, sans-serif" font-size="40" font-weight="700" fill="#d8dee8">Environmental-intelligence systems &amp; multi-agent AI</text>
  <text x="90" y="412" font-family="JetBrains Mono, Menlo, monospace" font-size="22" font-weight="700" fill="#8a95a3">full-stack · climate data · explainable ML</text>

  <g transform="translate(88 470)">
    <rect x="0" y="0" width="224" height="58" rx="16" fill="#69e0c0" fill-opacity="0.06" stroke="#69e0c0" stroke-opacity="0.30"/>
    <text x="24" y="37" font-family="JetBrains Mono, Menlo, monospace" font-size="20" font-weight="800" fill="#eef1f6">700+ commits</text>
  </g>
  <g transform="translate(336 470)">
    <rect x="0" y="0" width="216" height="58" rx="16" fill="#69e0c0" fill-opacity="0.06" stroke="#69e0c0" stroke-opacity="0.30"/>
    <text x="24" y="37" font-family="JetBrains Mono, Menlo, monospace" font-size="20" font-weight="800" fill="#eef1f6">$17.8K raised</text>
  </g>

  <text x="88" y="592" font-family="JetBrains Mono, Menlo, monospace" font-size="18" font-weight="700" fill="#69e0c0" fill-opacity="0.8">mason-cao.github.io</text>
</svg>
